server:
  port: 8080

spring:
  redis:
    host: 127.0.0.1
    port: 6379
    database: 0
    timeout: 3000ms
  datasource:
    url: jdbc:mysql://localhost:3306/quant_stock?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver
  # 默认连 MySQL；仍不强制 Redis
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.quant.stock.market.dto,com.quant.stock.backtest.dto

management:
  endpoints:
    web:
      exposure:
        include: health,info

quant:
  stock-codes: 600036,000001,300059,601318,000858
  max-single-position: 0.3
  max-total-position: 0.8
  fee-rate: 0.0003
  slip-point: 0.001
  base-atr: 0.05
  atr-min-threshold: 0.001
  batch-pool-size: 10
  # 交易候选池上限；实盘分钟扫描只打池内，不扫全市场
  trade-pool-max: 30
  # 目标池多因子：最低综合分；上市满 N 天；均成交额下限（元，0=关闭；生产可设 50000000）
  pool-score-min: 45
  pool-min-list-days: 60
  pool-min-avg-amount20: 0
  # db：优先读 MySQL market_daily / market_minute；启动空库时从 classpath JSON 导入
  market-mode: db
  mock-bar-days: 15
  db-enabled: true

  # ---- 策略过滤 ----
  trend-filter-enabled: false
  volume-filter-enabled: false
  volume-confirm-ratio: 1.2
  adx-filter-enabled: false
  adx-min: 25
  adx-chop-max: 20
  rsi-buy-max: 60

  # ---- 止损止盈 ----
  stop-loss-enabled: true
  atr-stop-multiplier: 2.0
  hard-stop-capital-pct: 0.02
  trailing-stop-enabled: true
  trailing-atr-multiplier: 1.5

  # ---- 金字塔 ----
  pyramid-enabled: true
  pyramid-first: 0.50
  pyramid-second: 0.30
  pyramid-third: 0.20
  pyramid-add-pct: 0.01

  # ---- 账户熔断 ----
  daily-loss-limit-pct: 0.03
  consecutive-loss-limit: 5
  drawdown-reduce-pct: 0.15
  drawdown-halt-pct: 0.25

  # ---- 开仓过滤 ----
  quiet-open-enabled: true
  quiet-close-enabled: true
  min-avg-volume20: 1000
  min-market-cap-yi: 50
  market-cap-filter-enabled: true
  trade-mode: sim

  # ---- 真实成本 ----
  stamp-tax-rate: 0.001
  slip-large: 0.0005
  slip-mid: 0.002
  slip-small: 0.005
  vol-large-threshold: 20000000
  vol-mid-threshold: 5000000
  impact-coeff: 0.1
  next-bar-open-fill: true

  # ---- 定时任务总闸；各任务以 MySQL sys_schedule_job 为准（种子默认全关，页面可启停/改 cron）----
  schedule:
    enabled: true

  # ---- 安全与运维 ----
  api-key: ${QUANT_API_KEY:}
  rate-limit-per-minute: ${QUANT_RATE_LIMIT:30}
  history-dir: ${QUANT_HISTORY_DIR:data/backtest}

logging:
  level:
    com.quant.stock: INFO
    com.quant.stock.mapper: INFO

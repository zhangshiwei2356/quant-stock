<p>移动平均线（Moving Average）是一段时间收盘价的算术平均，用来刻画趋势与成本重心。</p><ul><li><code>MA5</code>：近 5 根K线均价，更灵敏，常看作短线成本</li><li><code>MA20</code>：近 20 根，中短线趋势参考</li><li><code>MA60</code>：近 60 根，偏大周期方向过滤</li></ul><h4>金叉 / 死叉</h4><p><b>金叉</b>：短期均线由下向上穿越长期均线，常作买入参考；<b>死叉</b>则相反。</p><p>震荡市中均线会反复交叉产生假信号，因此本系统可叠加大周期趋势、放量、ADX 等过滤。</p>

<p>账户级风控在单票止损之外，限制「亏太多还继续开新仓」或「回撤过大继续满仓」。</p>

<h4>常见机制</h4>
<ul>
  <li>单日亏损上限</li>
  <li>连续亏损冷却</li>
  <li>峰值回撤降仓 / 熔断</li>
</ul>

<h4>本应用相关</h4>
<ul>
  <li><b>单日亏</b>：≥昨收权益的 3% → 当日禁新开</li>
  <li><b>连亏</b>：完整开平连亏 5 次 → 当日禁开，<strong>次日自动恢复</strong></li>
  <li><b>回撤</b>：峰值回撤 ≥15% → 仓位系数×0.5；≥25% → 系数 0、挂清仓、禁新开（本轮粘性，回测结束或进程重启前不自动解除）</li>
  <li>单票止损 / trail / 跌停强平属于持仓风控，见「ATR」「涨跌停」「交易规则」</li>
  <li>组合回测共用同一套账户风控；实盘另有墙钟交易时段等校验</li>
</ul>

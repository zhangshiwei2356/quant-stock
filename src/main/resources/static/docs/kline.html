<p>K线（蜡烛图）用一根柱子概括一段时间的开高低收：</p>
<ul>
  <li><b>开盘价 Open</b>：区间第一笔成交价</li>
  <li><b>最高价 High / 最低价 Low</b>：区间极值</li>
  <li><b>收盘价 Close</b>：区间最后一笔成交价</li>
  <li><b>成交量 Volume</b>：区间成交股数合计</li>
</ul>
<h4>本系统周期</h4>
<p>物理存储：日线（<code>market_daily</code>）与 <b>5 分钟K</b>（<code>market_minute</code>）。15/30/60 分钟、周、月由运行时聚合：开=首根开、收=末根收、高=最高、低=最低、量=求和；请求 1 分钟时降级为 5 分钟序列。</p>
<p>指标与回测应使用<strong>已闭合K线</strong>，未走完的当前K线默认剔除，避免用到未确认价格。</p>

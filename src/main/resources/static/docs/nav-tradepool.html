<!-- 一级菜单介绍：目标池 -->
<p class="nav-intro-lead">管理量化交易的<strong>唯一目标池</strong>。二级菜单查看当前池名单与历次扫描入选报告；盘后扫描自动覆盖；人工可移出（移出≠卖出）。</p>
<div class="nav-intro-grid">
  <section class="nav-intro-card">
    <h4><span class="nav-intro-card-tag">二级</span>菜单说明</h4>
    <ul class="nav-intro-list">
      <li><strong>当前池</strong>：当前生效的可买名单（综合分、入池原因）</li>
      <li><strong>扫描历史</strong>：按 batch_id 查看历次扫描入选报告</li>
      <li><strong>扫描更新</strong>：覆盖本池并展示漏斗；可下载 Markdown 报告</li>
    </ul>
  </section>
  <section class="nav-intro-card nav-intro-card--steps">
    <h4><span class="nav-intro-card-tag">步骤</span>建议流程</h4>
    <ol class="nav-intro-steps">
      <li>点「当前池」或开启定时 <code>pool-rebuild</code></li>
      <li>在列表点「扫描更新」；不需要的点「移出」</li>
      <li>在「扫描历史」核对某日批次入选名单</li>
    </ol>
  </section>
</div>
<div class="nav-intro-cta">
  <button type="button" class="nav-intro-btn" data-enter-mode="tradepool" data-tp-panel="pool">进入当前池</button>
  <button type="button" class="nav-intro-btn secondary" data-enter-mode="tradepool" data-tp-panel="history">查看扫描历史</button>
</div>
<p class="nav-intro-hint">再点一次「目标池」可收起并回初始化页。</p>

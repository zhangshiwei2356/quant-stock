<!-- 一级菜单介绍：组合回测 -->
<p class="nav-intro-lead">组合回测让多只股票<strong>共享同一资金池</strong>，按统一账户风控推进，适合观察分股贡献与整体回撤。</p>
<h4>能做什么</h4>
<ul>
  <li>勾选多只成分股；强制日线；共用现金与熔断/连亏等账户规则</li>
  <li>查看组合权益曲线、收益看板、成交流水、分股汇总</li>
  <li>历史与分析落库；点击历史行可展开对应分析</li>
</ul>
<h4>怎么开始</h4>
<ol>
  <li>在左侧勾选至少两只（或按需勾选）成分股</li>
  <li>点击下方按钮进入组合回测工作台，设置资金与时间后运行</li>
</ol>
<p style="margin-top:14px;">
  <button type="button" class="home-action" data-enter-mode="portfolio">进入组合回测工作台</button>
</p>
<p class="hint">组合与单股引擎存在少量差异（加仓过滤、仓位缩量等），见交易规则「引擎差异速查」。再点一次「组合回测」可收起并回初始化页。</p>

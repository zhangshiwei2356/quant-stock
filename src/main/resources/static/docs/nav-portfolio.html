<!-- 一级菜单介绍：组合回测 -->
<p class="nav-intro-lead">组合回测让多只股票<strong>共享同一资金池</strong>，按统一账户风控推进，适合观察分股贡献与整体回撤。</p>
<div class="nav-intro-grid">
  <section class="nav-intro-card">
    <h4><span class="nav-intro-card-tag">二级</span>菜单说明</h4>
    <ul class="nav-intro-list">
      <li><strong>回测工作台</strong>：多选成分股、设资金/区间，执行日K共享资金池回测，查看权益与分股表现</li>
      <li><strong>回测历史</strong>：落盘记录与分析；点击历史行可展开对应分析</li>
    </ul>
  </section>
  <section class="nav-intro-card nav-intro-card--steps">
    <h4><span class="nav-intro-card-tag">步骤</span>怎么开始</h4>
    <ol class="nav-intro-steps">
      <li>点「回测工作台」，搜索并勾选至少两只成分股（可点标签移除）</li>
      <li>设置初始资金与回测区间后执行；需要时再进「回测历史」</li>
    </ol>
  </section>
</div>
<div class="nav-intro-cta">
  <button type="button" class="nav-intro-btn" data-enter-mode="portfolio" data-portfolio-panel="workspace">进入回测工作台</button>
  <button type="button" class="nav-intro-btn secondary" data-enter-mode="portfolio" data-portfolio-panel="history">回测历史</button>
</div>
<p class="nav-intro-hint">组合与单股引擎存在少量差异（加仓过滤、仓位缩量等），见交易规则「引擎差异速查」。再点一次「组合回测」可收起并回初始化页。</p>

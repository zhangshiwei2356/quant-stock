<!-- 一级菜单介绍：数据表 -->
<p class="nav-intro-lead">按白名单浏览本应用 MySQL 业务表，便于核对落库数据与排查问题。</p>
<div class="nav-intro-grid">
  <section class="nav-intro-card">
    <h4><span class="nav-intro-card-tag">能力</span>能做什么</h4>
    <ul class="nav-intro-list">
      <li>左侧每个子菜单对应一张业务表</li>
      <li>分页查看行数据；只读，不支持任意 SQL</li>
      <li>表说明见各表备注（模块分组）</li>
    </ul>
  </section>
  <section class="nav-intro-card nav-intro-card--steps">
    <h4><span class="nav-intro-card-tag">步骤</span>怎么开始</h4>
    <ol class="nav-intro-steps">
      <li>左侧点选表名进入浏览页</li>
      <li>用分页浏览；需要改配置请走「运维中心」或直接改库</li>
    </ol>
  </section>
</div>
<p class="nav-intro-hint">仅白名单内表可查，不支持任意 SQL。再点一次「数据表」可收起并回初始化页。</p>

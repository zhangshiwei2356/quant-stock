<!-- 初始化 / 欢迎页片段：由 stock.html 的 #viewHome 加载 -->
<section class="panel home-panel" id="homePanel">
  <div class="home-toolbar">
    <button type="button" id="btnCollapseHome" class="secondary home-collapse-btn" title="收起欢迎页，查看主题背景">收起 · 查看主题</button>
  </div>
  <p class="home-brand">Quant Stock</p>
  <h3 class="home-title">开始使用</h3>
  <p class="home-lead" id="homeLead">左侧尚未展开菜单。点击下方入口，或展开左侧一级菜单进入对应功能。</p>
  <div class="home-actions">
    <button type="button" class="home-action" data-open-nav="poolBody" data-mode="pool">股票池</button>
    <button type="button" class="home-action" data-open-nav="singleBody" data-mode="single">单股回测</button>
    <button type="button" class="home-action" data-open-nav="portfolioBody" data-mode="portfolio">组合回测</button>
    <button type="button" class="home-action secondary" data-open-nav="stockKnowledgeMenu" data-mode="doc">股票知识</button>
    <button type="button" class="home-action secondary" data-open-nav="appRelatedMenu" data-mode="doc">本应用相关</button>
  </div>
  <ul class="home-tips">
    <li>点击任一一级菜单：右侧先展示<strong>该菜单介绍页</strong>；再点左侧二级项进入具体功能或文档</li>
    <li>再点同一一级菜单：收起菜单并回到本初始化页</li>
    <li>页头可切换主题；点 <b>QS / Quant Stock</b> 可随时收起全部菜单回到本页</li>
    <li>也可点右上「收起 · 查看主题」欣赏动态背景</li>
    <li>介绍页维护在 <code>docs/nav-*.html</code>；本页为 <code>docs/home.html</code></li>
  </ul>
</section>

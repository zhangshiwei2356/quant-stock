<p>A股是人民币普通股票，在上海证券交易所（沪市）与深圳证券交易所（深市）上市交易，面向境内投资者。</p><h4>常见板块</h4><ul><li><b>主板</b>：沪市以 <code>6</code> 开头（如 600036），深市以 <code>000</code> 开头（如 000001）。</li><li><b>创业板</b>：深市 <code>300</code> 开头（如 300059），成长型企业居多，涨跌幅限制更宽。</li><li><b>科创板</b>：沪市 <code>688</code> 开头，注册制，投资者门槛更高。</li></ul><h4>交易单位</h4><p>买卖通常以 <b>100 股</b>为一手（整数手），不足一手为碎股，规则受限。</p>

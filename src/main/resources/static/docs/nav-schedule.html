<!-- 一级菜单介绍：运维中心 -->
<p class="nav-intro-lead">管理预置定时任务，并查看<strong>数据健康</strong>与<strong>运行参数</strong>。任务配置写入 MySQL，改完立即重载。</p>
<div class="nav-intro-grid">
  <section class="nav-intro-card">
    <h4><span class="nav-intro-card-tag">二级</span>菜单说明</h4>
    <ul class="nav-intro-list">
      <li><strong>任务管理</strong>：启停任务、改 cron / 间隔（表 <code>sys_schedule_job</code>）</li>
      <li><strong>数据健康</strong>：全市场日线/分钟覆盖与滞后检查</li>
      <li><strong>运行参数</strong>：当前生效 yml 参数（中文说明对照配置键）+ <code>system_config</code> 只读</li>
    </ul>
  </section>
  <section class="nav-intro-card nav-intro-card--steps">
    <h4><span class="nav-intro-card-tag">步骤</span>建议流程</h4>
    <ol class="nav-intro-steps">
      <li>确认 MySQL 已建库且 <code>quant.db-enabled=true</code></li>
      <li>在「任务管理」只打开需要的任务并核对 cron</li>
      <li>用「数据健康」核对行情是否滞后后再开扫描</li>
    </ol>
  </section>
</div>
<div class="nav-intro-cta">
  <button type="button" class="nav-intro-btn" data-enter-mode="schedule" data-schedule-panel="jobs">进入任务管理</button>
  <button type="button" class="nav-intro-btn secondary" data-enter-mode="schedule" data-schedule-panel="health">数据健康</button>
</div>
<p class="nav-intro-hint">再点一次「运维中心」可收起并回初始化页。</p>

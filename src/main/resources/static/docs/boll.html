<p>布林带（Bollinger Bands）通常由中轨（如 20 周期 SMA）与上下轨（中轨 ± 若干倍标准差，常见 2 倍）构成。</p>
<ul>
  <li>价格贴近上轨：偏强或超买区</li>
  <li>价格贴近下轨：偏弱或超卖区</li>
  <li>带宽扩大：波动升温；收窄：波动下降，可能酝酿突破</li>
</ul>

<h4>本系统用法</h4>
<ul>
  <li>主要用于<strong>K 线图表叠加显示</strong>，便于观察震荡区间与突破</li>
  <li><strong>不参与</strong>金叉买卖信号的开平仓判定（策略核心仍是 MA + RSI/ATR 等）</li>
  <li>若要用布林带做策略过滤，需另行扩展代码；当前可作人工辅助观察</li>
</ul>

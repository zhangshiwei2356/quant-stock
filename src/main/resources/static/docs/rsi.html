<p>RSI（Relative Strength Index，相对强弱指数）衡量一段时间内涨跌力量对比，常用周期 <b>14</b>。</p>
<ul>
  <li>经验上 <code>RSI &gt; 70</code> 偏超买，追高风险大</li>
  <li><code>RSI &lt; 30</code> 偏超卖，可能存在反弹机会</li>
  <li>强趋势中 RSI 可长期处在高位或低位，不宜单独作为开平仓依据</li>
</ul>

<h4>本系统用法</h4>
<ul>
  <li>买入默认要求 RSI14 &lt; <code>rsi-buy-max</code>（默认 <b>60</b>），减少高位接盘</li>
  <li>属于金叉后的<strong>必过过滤</strong>（与 ATR 下限一起）</li>
  <li>金字塔加仓<strong>不重验</strong> RSI</li>
  <li>死叉卖出不看 RSI</li>
  <li>页面 K 线副图可显示 RSI 便于对照信号</li>
</ul>

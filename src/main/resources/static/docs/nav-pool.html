<!-- 一级菜单介绍：行情浏览 -->
<p class="nav-intro-lead">本模块用于<strong>浏览行情</strong>，不跑回测。可同时开启多只股票，用标签切换查看。</p>
<div class="nav-intro-grid">
  <section class="nav-intro-card">
    <h4><span class="nav-intro-card-tag">能力</span>能做什么</h4>
    <ul class="nav-intro-list">
      <li>点左侧股票开启信息；支持同时打开多只，顶部标签切换</li>
      <li>切换 K 线周期（日/周/月/分钟等），查看 MA、布林带、RSI</li>
      <li>下方可看当前周期末尾 K 线明细表</li>
    </ul>
  </section>
  <section class="nav-intro-card nav-intro-card--steps">
    <h4><span class="nav-intro-card-tag">步骤</span>怎么开始</h4>
    <ol class="nav-intro-steps">
      <li>在左侧二级列表中<strong>点击一只股票</strong></li>
      <li>右侧将进入行情浏览工作台并加载行情</li>
    </ol>
  </section>
</div>
<p class="nav-intro-hint">再点一次「行情浏览」一级菜单可收起并回到全局初始化页；点页头 QS 亦可随时回初始化页。</p>

<!-- 一级菜单介绍：股票池 -->
<p class="nav-intro-lead">股票池用于<strong>浏览行情</strong>，不跑回测。可同时开启多只股票，用标签切换查看。</p>
<h4>能做什么</h4>
<ul>
  <li>点左侧股票开启信息；支持同时打开多只，顶部标签切换</li>
  <li>切换 K 线周期（日/周/月/分钟等），查看 MA、布林带、RSI</li>
  <li>下方可看当前周期末尾 K 线明细表</li>
</ul>
<h4>怎么开始</h4>
<ol>
  <li>在左侧二级列表中<strong>点击一只股票</strong></li>
  <li>右侧将进入股票池工作台并加载行情</li>
</ol>
<p class="hint">再点一次「股票池」一级菜单可收起并回到全局初始化页；点页头 QS 亦可随时回初始化页。</p>

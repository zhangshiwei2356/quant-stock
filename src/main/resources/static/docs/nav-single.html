<!-- 一级菜单介绍：个股回测 -->
<p class="nav-intro-lead">个股回测对<strong>一只股票</strong>按均线金叉策略做历史模拟，并给出买卖点、权益曲线与决策分析。</p>
<div class="nav-intro-grid">
  <section class="nav-intro-card">
    <h4><span class="nav-intro-card-tag">能力</span>能做什么</h4>
    <ul class="nav-intro-list">
      <li>选择标的后查看基础 K 线 + 买卖点信号图</li>
      <li>配置周期、起止时间（留空=全量）、初始资金（默认 100000）</li>
      <li>运行回测：权益曲线、成交明细、收益汇总、K 线表</li>
      <li>批量扫描配置标的；历史与决策分析一一对应（点击历史行展开）</li>
    </ul>
  </section>
  <section class="nav-intro-card nav-intro-card--steps">
    <h4><span class="nav-intro-card-tag">步骤</span>怎么开始</h4>
    <ol class="nav-intro-steps">
      <li>在左侧二级列表中<strong>点选一只股票</strong>（或点「回测」快捷按钮）</li>
      <li>在右侧工作台设置参数后点击运行</li>
    </ol>
  </section>
</div>
<p class="nav-intro-hint">规则细节见「应用说明 → 交易规则」。再点一次「个股回测」可收起并回初始化页。</p>

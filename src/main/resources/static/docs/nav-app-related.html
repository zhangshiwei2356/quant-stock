<!-- 片段：应用说明一级菜单介绍 -->
<div class="nav-intro">
  <p class="nav-intro-lead">应用说明收录启动方式、交易规则与整应用待办，便于对照代码能力。</p>
  <ul class="nav-intro-list">
    <li><b>系统概述</b>：启动、模块边界、库表与页面结构</li>
    <li><b>交易规则</b>：仓位、T+1、止损、熔断与池规则</li>
    <li><b>应用待办</b>：本地已落地项 + 依赖外部 API 的待办（整应用路线图）</li>
  </ul>
  <h4 class="nav-intro-h">怎么用</h4>
  <ol class="nav-intro-steps">
    <li>在左侧点选「系统概述 / 交易规则 / 应用待办」</li>
    <li>对照 README 与库表浏览核对当前能力</li>
    <li>接入外部数据或改规则后，同步更新对应文档页</li>
  </ol>
</div>
<p class="nav-intro-hint">可将介绍、交易规则、应用待办合并导出为 PDF。再点一次「应用说明」可收起并回初始化页。</p>

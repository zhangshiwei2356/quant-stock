<!-- 一级菜单介绍：账户概览 -->
<p class="nav-intro-lead">查看<strong>本地模拟账本</strong>的资金、持仓（含 T+1 批次）、委托、日结与风控事件。</p>
<div class="nav-intro-grid">
  <section class="nav-intro-card">
    <h4><span class="nav-intro-card-tag">范围</span>能看什么</h4>
    <ul class="nav-intro-list">
      <li><strong>资金权益</strong>：现金、市值、回撤、熔断状态</li>
      <li><strong>当前持仓</strong>：点行展开批次；可卖股数 / 挂单 / 金字塔</li>
      <li><strong>委托记录</strong>：优先读 <code>trade_orders</code>（重启可恢复）</li>
      <li><strong>权益日结 / 风控事件</strong>：日结曲线与熔断日志</li>
    </ul>
  </section>
  <section class="nav-intro-card nav-intro-card--steps">
    <h4><span class="nav-intro-card-tag">注意</span>数据来源</h4>
    <ol class="nav-intro-steps">
      <li>本地模拟，非券商柜台</li>
      <li>成交/持仓/现金已落库；日结需跑过 <code>settle-after-close</code></li>
      <li>原始表亦可在「数据表」中查看</li>
    </ol>
  </section>
</div>
<div class="nav-intro-cta">
  <button type="button" class="nav-intro-btn" data-enter-mode="account" data-account-panel="funds">进入资金权益</button>
  <button type="button" class="nav-intro-btn secondary" data-enter-mode="account" data-account-panel="positions">查看当前持仓</button>
</div>
<p class="nav-intro-hint">再点一次「账户概览」可收起并回初始化页。</p>

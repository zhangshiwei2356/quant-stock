<p><b>T+1</b>：当日买入的股票，最早下一交易日才能卖出。A股普通股票普遍适用（部分品种另有规则）。</p>

<h4>整手交易</h4>
<p>买入通常须为 100 股整数倍；卖出不足一手时规则受限。本应用一律按整手（100 股）取整。</p>

<h4>本系统用法</h4>
<ul>
  <li>持仓按<strong>分档 lot</strong>记录买入日；止损 / 移动止盈仅可卖 <code>openDate &lt; 今日</code> 的老仓</li>
  <li>可出现<strong>部分止损</strong>：只卖掉可卖老仓，今仓保留并重算止损（单股引擎）</li>
  <li><b>死叉 / 熔断清仓挂卖</b>不受 T+1 约束，下一有效撮合可卖全部持仓（含今仓）——这是回测引擎约定，与券商真实限制可能不同</li>
  <li>同日首开与加仓互斥：当日已加仓则不再受理首开，反之亦然</li>
</ul>
